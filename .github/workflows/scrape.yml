name: 'Table Sums - 24f2006754@ds.study.iitm.ac.in'

on: [push]  # Runs every time you push code

jobs:
  scrape:
    timeout-minutes: 15
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: 'Install 24f2006754@ds.study.iitm.ac.in dependencies'
        run: npm ci
      
      - name: 'Run scraper - 24f2006754@ds.study.iitm.ac.in'
        run: npx playwright test scrape.spec.ts
      
      - name: 'Upload logs - 24f2006754@ds.study.iitm.ac.in'
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: test-results/
